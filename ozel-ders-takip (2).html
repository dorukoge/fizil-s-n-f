<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Özel Ders Takip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0f14;--surface:#16181f;--surface2:#1e2029;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8e9f0;--text2:rgba(232,233,240,0.5);--text3:rgba(232,233,240,0.25);--accent:#7c6af7;--accent2:#a78bfa;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;}
.main{margin-left:240px;flex:1;padding:32px;max-width:1100px;}
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.logo-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);line-height:1.2;}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{color:var(--text);background:rgba(124,106,247,0.08);}
.nav-item.active{color:var(--accent2);background:rgba(124,106,247,0.12);border-left-color:var(--accent);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-section{padding:16px 20px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);}
.page-header{margin-bottom:28px;}
.page-title{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);}
.page-sub{color:var(--text2);font-size:14px;margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;}
.card-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.purple::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.stat-card.green::before{background:linear-gradient(90deg,#059669,var(--green));}
.stat-card.yellow::before{background:linear-gradient(90deg,#d97706,var(--yellow));}
.stat-card.red::before{background:linear-gradient(90deg,#dc2626,var(--red));}
.stat-num{font-family:'DM Serif Display',serif;font-size:36px;color:var(--text);line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-top:6px;}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px;}
.student-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .25s;}
.student-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,106,247,0.15);}
.student-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:white;margin-bottom:12px;}
.student-name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px;}
.student-info{font-size:13px;color:var(--text2);}
.student-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.5px;}
.tag-purple{background:rgba(124,106,247,0.2);color:var(--accent2);border:1px solid rgba(124,106,247,0.3);}
.tag-green{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.25);}
.tag-red{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.25);}
.tag-yellow{background:rgba(251,191,36,0.15);color:var(--yellow);border:1px solid rgba(251,191,36,0.25);}
.tag-orange{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.25);}
.form-row{display:flex;gap:12px;margin-bottom:14px;}
.form-group{flex:1;display:flex;flex-direction:column;gap:6px;}
.form-group label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
input,textarea,select{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--surface2);}
.btn{border:none;border-radius:10px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9d8bf0);color:#fff;box-shadow:0 4px 16px rgba(124,106,247,0.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,106,247,0.5);}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2);}
.btn-green{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:var(--green);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px;}
.lesson-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;position:relative;}
.lesson-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:6px;}
.lesson-topic{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}
.lesson-note{font-size:13px;color:var(--text2);line-height:1.6;}
.odev-item{display:flex;align-items:flex-start;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.odev-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;margin-top:1px;}
.odev-check.done{background:var(--green);border-color:var(--green);}
.odev-title{font-size:14px;color:var(--text);font-weight:500;}
.odev-title.done-text{text-decoration:line-through;color:var(--text3);}
.odev-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.odeme-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;}
.odeme-amount{font-family:'DM Serif Display',serif;font-size:22px;}
.odeme-amount.alindi{color:var(--green);}
.odeme-amount.bekliyor{color:var(--yellow);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:20px;color:var(--text);}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px;}
.empty-icon{font-size:36px;margin-bottom:12px;}
.next-card{background:linear-gradient(135deg,rgba(124,106,247,0.15),rgba(167,139,250,0.08));border:1px solid rgba(124,106,247,0.3);border-radius:16px;padding:20px;}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;}
.del-btn:hover{color:var(--red);}
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:fixed;bottom:0;top:auto;flex-direction:row;padding:0;border-right:none;border-top:1px solid var(--border);z-index:200;}
  .main{margin-left:0;margin-bottom:72px;padding:20px 16px;}
  .logo,.nav-section{display:none;}
  .nav-item{flex-direction:column;flex:1;padding:10px 4px;font-size:10px;gap:4px;border-left:none;border-top:3px solid transparent;}
  .nav-item.active{border-left:none;border-top-color:var(--accent);}
  .nav-icon{font-size:20px;}
  .grid-4{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
}
.c1{background:linear-gradient(135deg,#7c6af7,#a78bfa);}
.c2{background:linear-gradient(135deg,#059669,#34d399);}
.c3{background:linear-gradient(135deg,#d97706,#fbbf24);}
.c4{background:linear-gradient(135deg,#dc2626,#f87171);}
.c5{background:linear-gradient(135deg,#0891b2,#67e8f9);}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-title">Özel Ders<br/>Takip</div>
      <div class="logo-sub">Fizik Öğretmeni</div>
    </div>
    <div class="nav-section">Ana Menü</div>
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard"><span class="nav-icon">🏠</span> Genel Bakış</div>
    <div class="nav-item" onclick="showPage('ogrenciler')" id="nav-ogrenciler"><span class="nav-icon">👤</span> Öğrenciler</div>
    <div class="nav-section">Takip</div>
    <div class="nav-item" onclick="showPage('dersler')" id="nav-dersler"><span class="nav-icon">📚</span> Ders Notları</div>
    <div class="nav-item" onclick="showPage('odevler')" id="nav-odevler"><span class="nav-icon">✏️</span> Ödevler</div>
    <div class="nav-item" onclick="showPage('odemeler')" id="nav-odemeler"><span class="nav-icon">💰</span> Ödemeler</div>
    <div style="margin-top:auto;padding:20px;">
      <button onclick="sifirla()" style="width:100%;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:#f87171;border-radius:10px;padding:10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">🗑 Tüm Verileri Sıfırla</button>
    </div>
  </nav>
  <main class="main" id="main-content"></main>
</div>
<div id="modal-container"></div>

<script>
// ── VERİ ────────────────────────────────────────────────────────────────────
const DB={
  get:(k)=>JSON.parse(localStorage.getItem(k)||'[]'),
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  id:()=>Date.now().toString(36)+Math.random().toString(36).slice(2)
};
const COLORS=['c1','c2','c3','c4','c5'];
const get=()=>({o:DB.get('ogr'),d:DB.get('ders'),v:DB.get('odev'),p:DB.get('odeme')});
function save(k,v){DB.set(k,v);}

// Veriler localStorage'da saklanır

// ── YARDIMCI ───────────────────────────────────────────────────────────────
function fmt(t){if(!t)return'-';return new Date(t).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function byId(arr,id){return arr.find(x=>x.id===id);}

// ── SAYFA ──────────────────────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const n=document.getElementById('nav-'+page);if(n)n.classList.add('active');
  const m=document.getElementById('main-content');
  if(page==='dashboard')m.innerHTML=pageDash();
  else if(page==='ogrenciler')m.innerHTML=pageOgr();
  else if(page==='dersler')m.innerHTML=pageDers();
  else if(page==='odevler')m.innerHTML=pageOdev();
  else if(page==='odemeler')m.innerHTML=pageOdeme();
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function pageDash(){
  const {o,d,v,p}=get();
  const bekOdeme=p.filter(x=>x.durum==='bekliyor').reduce((a,x)=>a+x.miktar,0);
  const bekOdev=v.filter(x=>!x.yapildi).length;
  let h=`
  <div class="page-header"><div class="page-title">Merhaba 👋</div><div class="page-sub">Özel ders takip paneliniz</div></div>
  <div class="grid-4">
    <div class="stat-card purple"><div class="stat-num">${o.length}</div><div class="stat-label">Öğrenci</div></div>
    <div class="stat-card green"><div class="stat-num">${d.length}</div><div class="stat-label">Toplam Ders</div></div>
    <div class="stat-card yellow"><div class="stat-num">${bekOdev}</div><div class="stat-label">Bekleyen Ödev</div></div>
    <div class="stat-card red"><div class="stat-num">${bekOdeme}₺</div><div class="stat-label">Bekleyen Ödeme</div></div>
  </div>
  <div class="grid-2">
  <div><div class="card-title">🕐 Son Dersler</div>`;
  const sd=[...d].sort((a,b)=>b.tarih.localeCompare(a.tarih)).slice(0,4);
  if(!sd.length)h+=`<div class="empty"><div class="empty-icon">📚</div>Henüz ders kaydı yok</div>`;
  sd.forEach(x=>{const og=byId(o,x.oid);if(!og)return;
    h+=`<div class="lesson-item"><div class="lesson-date">${fmt(x.tarih)} · <span class="tag tag-purple">${og.ad}</span></div>
    <div class="lesson-topic">${x.konu}</div>
    ${x.sonraki?`<div style="margin-top:6px;font-size:12px;color:var(--accent2)">→ Sonraki: ${x.sonraki}</div>`:''}</div>`;
  });
  h+=`</div><div><div class="card-title">✏️ Bekleyen Ödevler</div>`;
  const bo=v.filter(x=>!x.yapildi).slice(0,5);
  if(!bo.length)h+=`<div class="empty"><div class="empty-icon">✅</div>Tüm ödevler tamamlandı!</div>`;
  bo.forEach(x=>{const og=byId(o,x.oid);if(!og)return;
    h+=`<div class="odev-item">
      <div class="odev-check" onclick="toggleOdev('${x.id}');showPage('dashboard')"></div>
      <div style="flex:1"><div class="odev-title">${x.baslik}</div><div class="odev-meta">${og.ad} · ${fmt(x.tarih)}</div></div>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

// ── ÖĞRENCİLER ─────────────────────────────────────────────────────────────
function pageOgr(){
  const {o,d,v}=get();
  let h=`<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div><div class="page-title">Öğrenciler</div><div class="page-sub">${o.length} aktif öğrenci</div></div>
    <button class="btn btn-primary" onclick="mOgrEkle()">+ Öğrenci Ekle</button>
  </div><div class="student-grid">`;
  o.forEach(x=>{
    const ds=d.filter(dd=>dd.oid===x.id);
    const bk=v.filter(vv=>vv.oid===x.id&&!vv.yapildi).length;
    const sd=[...ds].sort((a,b)=>b.tarih.localeCompare(a.tarih))[0];
    h+=`<div class="student-card" style="position:relative;" onclick="detay('${x.id}')">
      <button onclick="event.stopPropagation();silOgr('${x.id}')" style="position:absolute;top:12px;right:12px;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:#f87171;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;">Sil</button>
      <div class="student-avatar ${x.color||'c1'}">${x.ad.charAt(0)}</div>
      <div class="student-name">${x.ad}</div>
      <div class="student-info">${x.sinif} · ${x.ucret}₺/ders</div>
      ${x.not?`<div style="font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5">${x.not}</div>`:''}
      <div class="student-tags" style="margin-top:12px;">
        <span class="tag tag-purple">${ds.length} ders</span>
        ${bk>0?`<span class="tag tag-yellow">${bk} ödev bekliyor</span>`:'<span class="tag tag-green">Ödev tamam</span>'}
        ${sd?`<span class="tag tag-orange">Son: ${fmt(sd.tarih)}</span>`:''}
      </div>
    </div>`;
  });
  if(!o.length)h+=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👤</div>Henüz öğrenci eklenmedi<br/><br/><button class="btn btn-primary" onclick="mOgrEkle()">İlk Öğrenciyi Ekle</button></div>`;
  h+=`</div>`;
  return h;
}

function detay(id){
  const {o,d,v,p}=get();
  const og=byId(o,id);if(!og)return;
  const ds=[...d.filter(x=>x.oid===id)].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  const vs=v.filter(x=>x.oid===id);
  const ps=p.filter(x=>x.oid===id);
  const sd=ds[0];
  let h=`<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="student-avatar ${og.color||'c1'}" style="width:56px;height:56px;font-size:24px;border-radius:14px;">${og.ad.charAt(0)}</div>
      <div><div style="font-family:'DM Serif Display',serif;font-size:26px;">${og.ad}</div><div style="color:var(--text2);font-size:14px;margin-top:4px;">${og.sinif} · ${og.ucret}₺/ders</div></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" onclick="mDersEkle('${id}')">+ Ders Ekle</button>
      <button class="btn btn-ghost btn-sm" onclick="mOdevEkle('${id}')">+ Ödev Ver</button>
      <button class="btn btn-ghost btn-sm" onclick="mOdemeEkle('${id}')">+ Ödeme</button>
      <button class="btn btn-ghost btn-sm" onclick="showPage('ogrenciler')">← Geri</button>
    </div>
  </div>`;

  if(sd){
    h+=`<div class="next-card" style="margin-bottom:20px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px;">📌 SON DERS & SONRAKI PLAN</div>
      <div style="display:flex;gap:24px;flex-wrap:wrap;">
        <div><div style="font-size:12px;color:var(--text3);margin-bottom:4px;">Son İşlenen</div><div style="font-size:16px;font-weight:600;">${sd.konu}</div><div style="font-size:12px;color:var(--text2);margin-top:2px;">${fmt(sd.tarih)}</div></div>
        ${sd.sonraki?`<div><div style="font-size:12px;color:var(--text3);margin-bottom:4px;">Bir Sonraki Ders</div><div style="font-size:16px;font-weight:600;color:var(--accent2);">${sd.sonraki}</div></div>`:''}
      </div>
      ${sd.not?`<div style="margin-top:12px;font-size:13px;color:var(--text2);border-top:1px solid rgba(255,255,255,.08);padding-top:10px;">${sd.not}</div>`:''}
    </div>`;
  }

  h+=`<div class="grid-2">`;
  // Ödevler
  h+=`<div><div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">✏️ Ödevler <button class="btn btn-ghost btn-sm" onclick="mOdevEkle('${id}')">+ Ekle</button></div>`;
  if(!vs.length)h+=`<div class="empty"><div class="empty-icon">✏️</div>Ödev yok</div>`;
  [...vs].sort((a,b)=>b.tarih.localeCompare(a.tarih)).forEach(x=>{
    h+=`<div class="odev-item">
      <div class="odev-check ${x.yapildi?'done':''}" onclick="toggleOdev('${x.id}');detay('${id}')">${x.yapildi?'✓':''}</div>
      <div style="flex:1"><div class="odev-title ${x.yapildi?'done-text':''}">${x.baslik}</div><div class="odev-meta">${fmt(x.tarih)}</div></div>
      <button class="del-btn" onclick="silOdev('${x.id}');detay('${id}')">×</button>
    </div>`;
  });
  h+=`</div>`;
  // Ödemeler
  h+=`<div><div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">💰 Ödemeler <button class="btn btn-ghost btn-sm" onclick="mOdemeEkle('${id}')">+ Ekle</button></div>`;
  if(!ps.length)h+=`<div class="empty"><div class="empty-icon">💰</div>Ödeme kaydı yok</div>`;
  [...ps].sort((a,b)=>b.tarih.localeCompare(a.tarih)).forEach(x=>{
    h+=`<div class="odeme-item">
      <div><div style="font-size:14px;font-weight:500;">${x.not||'Ödeme'}</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${fmt(x.tarih)}</div></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="odeme-amount ${x.durum}">${x.miktar}₺</div>
        ${x.durum==='bekliyor'?`<button class="btn btn-green btn-sm" onclick="odemeAlindi('${x.id}');detay('${id}')">✓ Alındı</button>`:`<button class="btn btn-ghost btn-sm" onclick="odemeBekliyor('${x.id}');detay('${id}')">↩ Geri Al</button>`}
      </div>
    </div>`;
  });
  h+=`</div></div>`;

  // Ders geçmişi
  h+=`<div style="margin-top:20px;"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">📚 Ders Geçmişi <button class="btn btn-ghost btn-sm" onclick="mDersEkle('${id}')">+ Ekle</button></div>`;
  if(!ds.length)h+=`<div class="empty"><div class="empty-icon">📚</div>Henüz ders işlenmedi</div>`;
  ds.forEach(x=>{
    h+=`<div class="lesson-item"><div class="lesson-date">${fmt(x.tarih)}</div>
      <div class="lesson-topic">${x.konu}</div>
      ${x.not?`<div class="lesson-note">${x.not}</div>`:''}
      ${x.sonraki?`<div style="margin-top:8px;font-size:12px;color:var(--accent2);">→ Sonraki: ${x.sonraki}</div>`:''}
      <button class="del-btn" style="position:absolute;top:12px;right:12px;" onclick="silDers('${x.id}');detay('${id}')">×</button>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('main-content').innerHTML=h;
}

// ── DERS NOTLARI ───────────────────────────────────────────────────────────
function pageDers(){
  const {o,d}=get();
  const ds=[...d].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  let h=`<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div><div class="page-title">Ders Notları</div><div class="page-sub">${ds.length} ders kaydı</div></div>
    <button class="btn btn-primary" onclick="mDersEkle(null)">+ Ders Ekle</button>
  </div>`;
  if(!ds.length)return h+`<div class="empty"><div class="empty-icon">📚</div>Henüz ders kaydı yok</div>`;
  ds.forEach(x=>{const og=byId(o,x.oid);
    h+=`<div class="lesson-item"><div class="lesson-date">${fmt(x.tarih)}${og?' · <span class="tag tag-purple">'+og.ad+'</span>':''}</div>
      <div class="lesson-topic">${x.konu}</div>
      ${x.not?`<div class="lesson-note">${x.not}</div>`:''}
      ${x.sonraki?`<div style="margin-top:8px;font-size:12px;color:var(--accent2);">→ Sonraki ders: ${x.sonraki}</div>`:''}
      <button class="del-btn" style="position:absolute;top:12px;right:12px;" onclick="silDers('${x.id}');showPage('dersler')">×</button>
    </div>`;
  });
  return h;
}

// ── ÖDEVLER ────────────────────────────────────────────────────────────────
function pageOdev(){
  const {o,v}=get();
  const bk=v.filter(x=>!x.yapildi).sort((a,b)=>b.tarih.localeCompare(a.tarih));
  const tm=v.filter(x=>x.yapildi).sort((a,b)=>b.tarih.localeCompare(a.tarih));
  let h=`<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div><div class="page-title">Ödevler</div><div class="page-sub">${bk.length} bekleyen ödev</div></div>
    <button class="btn btn-primary" onclick="mOdevEkle(null)">+ Ödev Ver</button>
  </div>`;
  if(bk.length){
    h+=`<div class="card-title">Bekleyen (${bk.length})</div>`;
    bk.forEach(x=>{const og=byId(o,x.oid);
      h+=`<div class="odev-item">
        <div class="odev-check" onclick="toggleOdev('${x.id}');showPage('odevler')"></div>
        <div style="flex:1"><div class="odev-title">${x.baslik}</div><div class="odev-meta">${og?og.ad:'-'} · ${fmt(x.tarih)}</div></div>
        <button class="del-btn" onclick="silOdev('${x.id}');showPage('odevler')">×</button>
      </div>`;
    });
  }
  if(tm.length){
    h+=`<hr class="divider"/><div class="card-title">Tamamlanan (${tm.length})</div>`;
    tm.slice(0,8).forEach(x=>{const og=byId(o,x.oid);
      h+=`<div class="odev-item" style="opacity:0.5;">
        <div class="odev-check done" onclick="toggleOdev('${x.id}');showPage('odevler')">✓</div>
        <div style="flex:1"><div class="odev-title done-text">${x.baslik}</div><div class="odev-meta">${og?og.ad:'-'} · ${fmt(x.tarih)}</div></div>
      </div>`;
    });
  }
  if(!v.length)h+=`<div class="empty"><div class="empty-icon">✏️</div>Henüz ödev eklenmedi</div>`;
  return h;
}

// ── ÖDEMELER ───────────────────────────────────────────────────────────────
function pageOdeme(){
  const {o,p}=get();
  const bk=p.filter(x=>x.durum==='bekliyor');
  const al=p.filter(x=>x.durum==='alindi').sort((a,b)=>b.tarih.localeCompare(a.tarih));
  const toplam=bk.reduce((a,x)=>a+x.miktar,0);
  let h=`<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div><div class="page-title">Ödemeler</div><div class="page-sub">${toplam>0?toplam+'₺ bekliyor':'Tüm ödemeler alındı ✓'}</div></div>
    <button class="btn btn-primary" onclick="mOdemeEkle(null)">+ Ödeme Ekle</button>
  </div>`;
  if(bk.length){
    h+=`<div class="card-title" style="color:var(--yellow);">⚠️ Bekleyen Ödemeler</div>`;
    bk.forEach(x=>{const og=byId(o,x.oid);
      h+=`<div class="odeme-item">
        <div><div style="font-size:14px;font-weight:500;">${og?og.ad:'-'}${x.not?' · '+x.not:''}</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${fmt(x.tarih)}</div></div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="odeme-amount bekliyor">${x.miktar}₺</div>
          <button class="btn btn-green btn-sm" onclick="odemeAlindi('${x.id}');showPage('odemeler')">✓ Alındı</button>
        </div>
      </div>`;
    });
    h+=`<hr class="divider"/>`;
  }
  if(al.length){
    h+=`<div class="card-title">✅ Alınan Ödemeler</div>`;
    al.forEach(x=>{const og=byId(o,x.oid);
      h+=`<div class="odeme-item">
        <div><div style="font-size:14px;font-weight:500;">${og?og.ad:'-'}${x.not?' · '+x.not:''}</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${fmt(x.tarih)}</div></div>
        <div class="odeme-amount alindi">${x.miktar}₺</div>
      </div>`;
    });
  }
  if(!p.length)h+=`<div class="empty"><div class="empty-icon">💰</div>Henüz ödeme kaydı yok</div>`;
  return h;
}

// ── MODALLER ───────────────────────────────────────────────────────────────
function showModal(html){
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="closeMO(event)"><div class="modal">${html}</div></div>`;
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function closeMO(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

function ogrOpts(sel){
  return DB.get('ogr').map(o=>`<option value="${o.id}"${o.id===sel?' selected':''}>${o.ad}</option>`).join('');
}

function mOgrEkle(){
  showModal(`<div class="modal-title">Öğrenci Ekle</div>
    <div class="form-row"><div class="form-group"><label>Ad Soyad</label><input id="f1" placeholder="Ahmet Yılmaz"/></div></div>
    <div class="form-row">
      <div class="form-group"><label>Sınıf</label><input id="f2" placeholder="11-A"/></div>
      <div class="form-group"><label>Ücret (₺/ders)</label><input id="f3" type="number" placeholder="400"/></div>
    </div>
    <div class="form-row"><div class="form-group"><label>Not</label><textarea id="f4" placeholder="Öğrenci hakkında notlar..."></textarea></div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveOgr()">Kaydet</button>
    </div>`);
}
function saveOgr(){
  const ad=document.getElementById('f1').value.trim();if(!ad)return alert('Ad zorunlu!');
  const l=DB.get('ogr');
  l.push({id:DB.id(),ad,sinif:document.getElementById('f2').value,ucret:parseInt(document.getElementById('f3').value)||0,not:document.getElementById('f4').value,color:COLORS[l.length%5]});
  DB.set('ogr',l);closeModal();showPage('ogrenciler');
}

function mDersEkle(oid){
  showModal(`<div class="modal-title">Ders Notu Ekle</div>
    <div class="form-row">
      <div class="form-group"><label>Öğrenci</label><select id="f1">${ogrOpts(oid)}</select></div>
      <div class="form-group"><label>Tarih</label><input id="f2" type="date" value="${today()}"/></div>
    </div>
    <div class="form-row"><div class="form-group"><label>İşlenen Konu</label><input id="f3" placeholder="Newton Yasaları"/></div></div>
    <div class="form-row"><div class="form-group"><label>Ders Notu</label><textarea id="f4" placeholder="Bu derste neler işlendi, öğrencinin durumu..."></textarea></div></div>
    <div class="form-row"><div class="form-group"><label>Bir Sonraki Ders Konusu</label><input id="f5" placeholder="Tork ve Denge"/></div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveDers('${oid}')">Kaydet</button>
    </div>`);
}
function saveDers(ret){
  const konu=document.getElementById('f3').value.trim();if(!konu)return alert('Konu zorunlu!');
  const l=DB.get('ders');
  l.push({id:DB.id(),oid:document.getElementById('f1').value,tarih:document.getElementById('f2').value,konu,not:document.getElementById('f4').value,sonraki:document.getElementById('f5').value});
  DB.set('ders',l);closeModal();
  if(ret)detay(ret);else showPage('dersler');
}

function mOdevEkle(oid){
  showModal(`<div class="modal-title">Ödev Ver</div>
    <div class="form-row">
      <div class="form-group"><label>Öğrenci</label><select id="f1">${ogrOpts(oid)}</select></div>
      <div class="form-group"><label>Tarih</label><input id="f2" type="date" value="${today()}"/></div>
    </div>
    <div class="form-row"><div class="form-group"><label>Ödev</label><textarea id="f3" placeholder="Sayfa 45-48 sorularını çöz..."></textarea></div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveOdev('${oid}')">Ver</button>
    </div>`);
}
function saveOdev(ret){
  const b=document.getElementById('f3').value.trim();if(!b)return alert('Ödev içeriği zorunlu!');
  const l=DB.get('odev');
  l.push({id:DB.id(),oid:document.getElementById('f1').value,tarih:document.getElementById('f2').value,baslik:b,yapildi:false});
  DB.set('odev',l);closeModal();
  if(ret)detay(ret);else showPage('odevler');
}

function mOdemeEkle(oid){
  showModal(`<div class="modal-title">Ödeme Ekle</div>
    <div class="form-row">
      <div class="form-group"><label>Öğrenci</label><select id="f1">${ogrOpts(oid)}</select></div>
      <div class="form-group"><label>Tarih</label><input id="f2" type="date" value="${today()}"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tutar (₺)</label><input id="f3" type="number" placeholder="400"/></div>
      <div class="form-group"><label>Durum</label><select id="f4"><option value="bekliyor">Bekliyor</option><option value="alindi">Alındı</option></select></div>
    </div>
    <div class="form-row"><div class="form-group"><label>Not</label><input id="f5" placeholder="Mart ayı, 4 ders..."/></div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveOdeme('${oid}')">Kaydet</button>
    </div>`);
}
function saveOdeme(ret){
  const m=parseInt(document.getElementById('f3').value);if(!m)return alert('Tutar zorunlu!');
  const l=DB.get('odeme');
  l.push({id:DB.id(),oid:document.getElementById('f1').value,tarih:document.getElementById('f2').value,miktar:m,durum:document.getElementById('f4').value,not:document.getElementById('f5').value});
  DB.set('odeme',l);closeModal();
  if(ret)detay(ret);else showPage('odemeler');
}

// ── AKSİYONLAR ─────────────────────────────────────────────────────────────
function toggleOdev(id){const l=DB.get('odev');const i=l.findIndex(x=>x.id===id);if(i>-1){l[i].yapildi=!l[i].yapildi;DB.set('odev',l);}}
function sifirla(){
  if(!confirm("Tüm veriler silinecek! Emin misin?")) return;
  localStorage.clear();
  location.reload();
}
function silOgr(id){if(!confirm("Bu öğrenciyi silmek istediğine emin misin?"))return;DB.set("ogr",DB.get("ogr").filter(x=>x.id!==id));DB.set("ders",DB.get("ders").filter(x=>x.oid!==id));DB.set("odev",DB.get("odev").filter(x=>x.oid!==id));DB.set("odeme",DB.get("odeme").filter(x=>x.oid!==id));showPage("ogrenciler");}
function sifirla(){
  if(!confirm("Tüm veriler silinecek! Emin misin?")) return;
  localStorage.clear();
  location.reload();
}
function silOgr(id){
  if(!confirm("Bu öğrenciyi ve tüm kayıtlarını silmek istediğine emin misin?")) return;
  DB.set("ogr", DB.get("ogr").filter(x=>x.id!==id));
  DB.set("ders", DB.get("ders").filter(x=>x.oid!==id));
  DB.set("odev", DB.get("odev").filter(x=>x.oid!==id));
  DB.set("odeme", DB.get("odeme").filter(x=>x.oid!==id));
  showPage("ogrenciler");
}
function silOdev(id){DB.set('odev',DB.get('odev').filter(x=>x.id!==id));}
function silDers(id){DB.set('ders',DB.get('ders').filter(x=>x.id!==id));}
function odemeBekliyor(id){const l=DB.get('odeme');const i=l.findIndex(x=>x.id===id);if(i>-1){l[i].durum='bekliyor';DB.set('odeme',l);}}
function odemeAlindi(id){const l=DB.get('odeme');const i=l.findIndex(x=>x.id===id);if(i>-1){l[i].durum='alindi';DB.set('odeme',l);}}

showPage('dashboard');
</script>
</body>
</html>
